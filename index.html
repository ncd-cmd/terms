<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy One — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --border: #2a2a30;
      --text: #e8e8ed;
      --muted: #8e8e99;
      --accent: #e8002d;
      --surface: #16161a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo-mark {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      color: #fff;
      margin: 0 auto 20px;
    }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 15px; text-align: center; margin-bottom: 40px; }
    .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: var(--text);
      width: 220px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--accent); }
    .card-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
    footer { margin-top: 48px; color: var(--muted); font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo-mark">F1</div>
  <h1>Fantasy One</h1>
  <p class="sub">Legal documents</p>
  <div class="cards">
    <a class="card" href="privacy.html">
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">How we collect, use, and protect your data.</div>
    </a>
    <a class="card" href="terms.html">
      <div class="card-title">Terms of Service</div>
      <div class="card-desc">Rules and conditions for using Fantasy One.</div>
    </a>
  </div>
  <footer>© 2026 Fantasy One · <a href="mailto:support@fantasyoneapp.com" style="color: inherit; text-decoration: underline;">support@fantasyoneapp.com</a></footer>
</body>
</html>
